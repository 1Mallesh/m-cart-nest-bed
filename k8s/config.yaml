apiVersion: v1
kind: ConfigMap
metadata:
  name: M-Cart-config
data:
  NODE_ENV: "production"
  PORT: "3000"
  API_PREFIX: "api"
  API_VERSION: "1"
---
# Template ONLY. Never commit real secret values — create this with:
#   kubectl create secret generic M-Cart-secrets \
#     --from-literal=MONGO_URI=... \
#     --from-literal=JWT_ACCESS_SECRET=... \
#     --from-literal=JWT_REFRESH_SECRET=... \
#     --from-literal=RAZORPAY_KEY_ID=... \
#     --from-literal=RAZORPAY_KEY_SECRET=...
# or manage via Sealed Secrets / External Secrets Operator / Vault.
apiVersion: v1
kind: Secret
metadata:
  name: M-Cart-secrets
type: Opaque
stringData:
  MONGO_URI: "REPLACE_VIA_SECRET_MANAGER"
  JWT_ACCESS_SECRET: "REPLACE_VIA_SECRET_MANAGER"
  JWT_REFRESH_SECRET: "REPLACE_VIA_SECRET_MANAGER"
  RAZORPAY_KEY_ID: "REPLACE_VIA_SECRET_MANAGER"
  RAZORPAY_KEY_SECRET: "REPLACE_VIA_SECRET_MANAGER"
