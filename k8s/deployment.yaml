apiVersion: apps/v1
kind: Deployment
metadata:
  name: M-Cart-api
  labels:
    app: M-Cart-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: M-Cart-api
  template:
    metadata:
      labels:
        app: M-Cart-api
    spec:
      containers:
        - name: api
          image: M-Cart:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: M-Cart-config
            - secretRef:
                name: M-Cart-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: M-Cart-api
spec:
  selector:
    app: M-Cart-api
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: M-Cart-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: M-Cart-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
